# /etc/nginx/sites-available/needaname
# À MERGER dans ta config needaname.fr existante (bloc server 443)
# ou remplacer ce fichier si tu n'en as pas encore.

server {
    listen 80;
    server_name needaname.fr www.needaname.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name needaname.fr www.needaname.fr;

    ssl_certificate     /etc/letsencrypt/live/needaname.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/needaname.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------
    # Site statique existant
    # -------------------------------------------------------
    root /var/www/needaname;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # -------------------------------------------------------
    # barWebsiteBuilder — Next.js sur le port 3001
    # Accessible via needaname.fr/app/builder
    # -------------------------------------------------------
    location /app/builder {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets statiques Next.js (builder)
    location /app/builder/_next/static/ {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
